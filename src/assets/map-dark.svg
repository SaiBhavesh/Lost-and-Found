<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 625" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stevens campus map (dark)">
  <defs>
    <linearGradient id="land-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2118"/>
      <stop offset="1" stop-color="#161a12"/>
    </linearGradient>
    <linearGradient id="river-d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#123042"/>
      <stop offset="1" stop-color="#1c4960"/>
    </linearGradient>
    <pattern id="grid-d" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3a4234" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Land base -->
  <rect width="1000" height="625" fill="url(#land-d)"/>
  <rect width="1000" height="625" fill="url(#grid-d)" opacity="0.3"/>

  <!-- Greens / lawn patches -->
  <g fill="#2b3a22" opacity="0.85">
    <ellipse cx="150" cy="420" rx="110" ry="70"/>
    <ellipse cx="780" cy="540" rx="130" ry="60"/>
    <ellipse cx="220" cy="100" rx="90" ry="50"/>
  </g>

  <!-- Quad (central green) -->
  <rect x="400" y="238" width="200" height="115" rx="10"
        fill="#304024" stroke="#627d45" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="500" y="300" text-anchor="middle" fill="#a8c079"
        font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="2">QUAD</text>

  <!-- Walking paths -->
  <g stroke="#3a382b" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M 180 125 Q 300 180 380 188"/>
    <path d="M 380 188 Q 470 210 550 238"/>
    <path d="M 550 238 Q 620 200 620 138"/>
    <path d="M 550 238 L 780 200"/>
    <path d="M 700 325 L 780 200"/>
    <path d="M 450 344 L 550 238"/>
    <path d="M 450 344 L 280 300"/>
    <path d="M 280 300 Q 320 400 350 469"/>
    <path d="M 350 469 L 500 438"/>
    <path d="M 500 438 L 700 325"/>
    <path d="M 500 438 L 820 438"/>
    <path d="M 820 438 L 880 550"/>
    <path d="M 780 200 L 920 344"/>
    <path d="M 820 438 L 920 344"/>
  </g>
  <g stroke="#55503b" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M 180 125 Q 300 180 380 188"/>
    <path d="M 380 188 Q 470 210 550 238"/>
    <path d="M 550 238 Q 620 200 620 138"/>
    <path d="M 550 238 L 780 200"/>
    <path d="M 700 325 L 780 200"/>
    <path d="M 450 344 L 550 238"/>
    <path d="M 450 344 L 280 300"/>
    <path d="M 280 300 Q 320 400 350 469"/>
    <path d="M 350 469 L 500 438"/>
    <path d="M 500 438 L 700 325"/>
    <path d="M 500 438 L 820 438"/>
    <path d="M 820 438 L 880 550"/>
    <path d="M 780 200 L 920 344"/>
    <path d="M 820 438 L 920 344"/>
  </g>

  <!-- Buildings (warm dark rects with glow) -->
  <g fill="#33301f" stroke="#7a6a3f" stroke-width="1.25">
    <rect x="750" y="175" width="60" height="45" rx="3"/>
    <rect x="670" y="302" width="60" height="42" rx="3"/>
    <rect x="520" y="215" width="60" height="42" rx="3"/>
    <rect x="420" y="320" width="60" height="42" rx="3"/>
    <rect x="350" y="165" width="60" height="42" rx="3"/>
    <rect x="250" y="278" width="60" height="42" rx="3"/>
    <rect x="590" y="115" width="60" height="42" rx="3"/>
    <rect x="470" y="415" width="60" height="42" rx="3"/>
    <rect x="320" y="446" width="60" height="42" rx="3"/>
    <rect x="790" y="415" width="60" height="42" rx="3"/>
    <rect x="150" y="103" width="60" height="42" rx="3"/>
    <rect x="855" y="525" width="50" height="45" rx="3"/>
  </g>

  <!-- Trees / vegetation dots -->
  <g fill="#4e6b32" opacity="0.9">
    <circle cx="90" cy="260" r="6"/><circle cx="115" cy="240" r="5"/><circle cx="70" cy="300" r="7"/>
    <circle cx="100" cy="340" r="5"/><circle cx="60" cy="380" r="6"/>
    <circle cx="260" cy="120" r="5"/><circle cx="300" cy="90" r="6"/>
    <circle cx="640" cy="380" r="5"/><circle cx="660" cy="410" r="6"/>
    <circle cx="420" cy="550" r="6"/><circle cx="460" cy="580" r="5"/>
    <circle cx="740" cy="480" r="5"/><circle cx="770" cy="510" r="6"/>
    <circle cx="180" cy="550" r="6"/><circle cx="230" cy="570" r="5"/>
    <circle cx="690" cy="80" r="5"/><circle cx="720" cy="110" r="6"/>
    <circle cx="570" cy="395" r="5"/>
  </g>

  <!-- Hudson River strip -->
  <rect x="920" y="0" width="80" height="625" fill="url(#river-d)"/>
  <g stroke="#6aa7c7" stroke-width="1" fill="none" opacity="0.3">
    <path d="M 935 80 q 10 -5 20 0 t 20 0"/>
    <path d="M 935 180 q 10 -5 20 0 t 20 0"/>
    <path d="M 935 280 q 10 -5 20 0 t 20 0"/>
    <path d="M 935 380 q 10 -5 20 0 t 20 0"/>
    <path d="M 935 480 q 10 -5 20 0 t 20 0"/>
    <path d="M 935 580 q 10 -5 20 0 t 20 0"/>
  </g>
  <text x="972" y="313" text-anchor="middle" fill="#9ec4d8"
        font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="4"
        transform="rotate(90 972 313)">HUDSON RIVER</text>
</svg>
